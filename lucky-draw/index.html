  [79,"บริษัท ศมลวรรณรุ่งเรืองกิจ จำกัด"],

  [81,"บริษัท เกรียงไกรรีไซเคิล จำกัด"],
  [82,"โรงพยาบาลเปาโลสมุทรปราการ"],
  [83,"บริษัท สมุทรเวชกิจ จำกัด"],
  [84,"บริษัท ศิครินทร์ จำกัด (มหาชน)"],
  [85,"บริษัท ดีไอซี สยามเคมีคอลอินดัสตรี้ จำกัด"],

  [89,"บริษัท เคซีอี อีเลคโทรนิคส์ จำกัด (มหาชน)"],
  [90,"บริษัท เอดีอี โซลูชั่น จำกัด"],
  [91,"บริษัท มัลติเทค ฟู๊ด แมนูแฟคเจอริ่ง จำกัด"]
];

const EXCLUDE_KEYWORDS = ["โอเชียนกลาส", "ไบโอแลป", "ไบโอแลบ"];

function isExcluded(name){
  return EXCLUDE_KEYWORDS.some(kw => name.includes(kw));
}

function maskDisplay(str){
  // Find any run of digits (optionally with -, spaces, parens) that is long enough to be a phone number
  // and mask its middle portion, regardless of what other text surrounds it.
  return str.replace(/(\+?\d[\d\-\s()]{6,}\d)/g, (match) => {
    const digitsOnly = match.replace(/[^\d]/g, '');
    if (digitsOnly.length < 8) return match; // too short to be a phone number, leave as-is
    const head = digitsOnly.slice(0, 3);
    const tail = digitsOnly.slice(-4);
    return `${head}-xxx-${tail}`;
  });
}

let eligiblePool = []; // each item: {num, name, line}
let spinning = false;

const ITEM_HEIGHT = 64;
const SPIN_DURATION_MS = 5 * 1000;

async function loadPool(){
  const respondedEl = document.getElementById('respondedCount');
  const countEl = document.getElementById('poolCount');
  const btn = document.getElementById('btnSpin');

  const timeoutPromise = new Promise((_, reject) =>
    setTimeout(() => reject(new Error('timeout')), 8000)
  );

  let snap;
  try {
    snap = await Promise.race([get(ref(db, 'lineids')), timeoutPromise]);
  } catch (err) {
    console.error('Firebase load error:', err);
    respondedEl.textContent = '❌ โหลดข้อมูลไม่สำเร็จ';
    countEl.textContent = 'ตรวจสอบอินเทอร์เน็ต แล้วกดรีเฟรชหน้านี้ (F5)';
    countEl.classList.add('warn');
    btn.textContent = 'โหลดไม่สำเร็จ ลองรีเฟรช';
    return;
  }

  const data = snap.val() || {};
  let respondedCompanies = 0;
  const peoplePool = [];

  for (const [num, name] of members) {
    const entry = data['m' + num];
    const line1 = entry && entry.line1 && entry.line1.trim();
    const line2 = entry && entry.line2 && entry.line2.trim();
    const hasResponded = !!(line1 || line2);
    if (!hasResponded) continue;
    respondedCompanies++;
    if (isExcluded(name)) continue;
    if (line1) peoplePool.push({num, name, line: line1});
    if (line2) peoplePool.push({num, name, line: line2});
  }

  eligiblePool = peoplePool;
  respondedEl.textContent = `📋 ตอบแบบสอบถามแล้ว ${respondedCompanies} บริษัท`;

  if (peoplePool.length === 0) {
    countEl.textContent = '⚠️ ยังไม่มีผู้แทนที่มีสิทธิ์ลุ้นรางวัล';
    countEl.classList.add('warn');
    btn.textContent = 'ยังไม่มีรายชื่อให้สุ่ม';
  } else {
    countEl.textContent = `✅ ผู้แทนมีสิทธิ์ลุ้นรางวัล ${peoplePool.length} คน`;
    btn.disabled = false;
    btn.textContent = '🎰 เริ่มสุ่มรางวัล';
  }
  buildReel();
}

function buildReel(){
  const track = document.getElementById('reelTrack');
  track.innerHTML = '';
  const display = eligiblePool.length ? eligiblePool : [{num:0,name:'รอข้อมูลสมาชิก...',line:''}];
  const repeated = [];
  for (let i=0;i<30;i++){
    display.forEach(p => repeated.push(p));
  }
  repeated.forEach(p => {
    const div = document.createElement('div');
    div.className = 'reel-item';
    const nameEl = document.createElement('div');
    nameEl.className = 'r-name';
    nameEl.textContent = p.name;
    div.appendChild(nameEl);
    if (p.line) {
      const lineEl = document.createElement('div');
      lineEl.className = 'r-line';
      lineEl.textContent = '💬 ' + maskDisplay(p.line);
      div.appendChild(lineEl);
    }
    track.appendChild(div);
  });
}

function pickWinnerIndex(){
  return Math.floor(Math.random() * eligiblePool.length);
}

window.startSpin = function(){
  if (spinning || eligiblePool.length === 0) return;
  spinning = true;
  document.getElementById('resultCard').classList.remove('show');
  document.getElementById('btnReset').classList.remove('show');
  document.getElementById('btnSpin').disabled = true;
  document.getElementById('btnSpin').textContent = '🎲 กำลังสุ่ม...';

  const resultIndex = pickWinnerIndex();
  const winner = eligiblePool[resultIndex];

  const track = document.getElementById('reelTrack');
  const totalItems = track.children.length;
  const poolSize = eligiblePool.length;
  const maskHeight = track.parentElement.clientHeight; // .reel-mask actual height

  // Land deep into the repeated list (not the very last cycle, so it still looks like it travelled)
  const landingCycle = 25; // out of 30 cycles built
  const targetIndexInTrack = (landingCycle * poolSize) + resultIndex;

  // We want the CENTER of the target item to sit at the CENTER of the mask.
  // Item top position within track:
  const itemTop = targetIndexInTrack * ITEM_HEIGHT;
  const itemCenter = itemTop + (ITEM_HEIGHT / 2);
  const maskCenter = maskHeight / 2;
  const finalOffset = itemCenter - maskCenter;

  track.style.transition = 'none';
  track.style.transform = 'translateY(0px)';

  void track.offsetHeight;

  track.style.transition = `transform ${SPIN_DURATION_MS}ms cubic-bezier(0.12, 0.85, 0.1, 1)`;
  track.style.transform = `translateY(-${finalOffset}px)`;

  document.getElementById('timerDisplay').classList.add('show');
  startTimer(SPIN_DURATION_MS);

  setTimeout(() => {
    revealWinner(winner);
  }, SPIN_DURATION_MS + 200);
};

function startTimer(durationMs){
  const display = document.getElementById('timerDisplay');
  const endTime = Date.now() + durationMs;
  function tick(){
    const remain = Math.max(0, endTime - Date.now());
    const secs = (remain / 1000).toFixed(1);
    display.textContent = `⏱️ กำลังสุ่ม... ${secs} วินาที`;
    if (remain > 0 && spinning) {
      requestAnimationFrame(tick);
    }
  }
  tick();
}

function revealWinner(winner){
  spinning = false;
  document.getElementById('timerDisplay').classList.remove('show');
  document.getElementById('resultCompany').textContent = winner.name;
  document.getElementById('resultLine').textContent = '💬 ' + maskDisplay(winner.line);
  document.getElementById('resultCard').classList.add('show');
  document.getElementById('btnReset').classList.add('show');
  document.getElementById('btnSpin').style.display = 'none';
  launchConfetti();
}

window.resetAll = function(){
  document.getElementById('resultCard').classList.remove('show');
  document.getElementById('btnReset').classList.remove('show');
  document.getElementById('btnSpin').style.display = 'inline-block';
  document.getElementById('btnSpin').disabled = eligiblePool.length === 0;
  document.getElementById('btnSpin').textContent = '🎰 เริ่มสุ่มรางวัล';
  const track = document.getElementById('reelTrack');
  track.style.transition = 'none';
  track.style.transform = 'translateY(0px)';
  document.getElementById('confettiLayer').innerHTML = '';
};

function launchConfetti(){
  const colors = ['#FF3CAC','#FF8A5B','#FFE259','#2ED9A3','#2E9FFF','#FF6B9D'];
  const layer = document.getElementById('confettiLayer');
  layer.innerHTML = '';
  for (let i=0;i<150;i++){
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random()*100 + 'vw';
    c.style.background = colors[Math.floor(Math.random()*colors.length)];
    c.style.width = (6 + Math.random()*9) + 'px';
    c.style.height = c.style.width;
    const duration = 3 + Math.random()*3;
    const delay = Math.random()*1.5;
    c.style.animation = `confettiFall ${duration}s ${delay}s ease-in forwards`;
    layer.appendChild(c);
  }
  setTimeout(() => { layer.innerHTML = ''; }, 8000);
}

function initSparkles(){
  const bg = document.getElementById('sparkleBg');
  const icons = ['✨','🎊','⭐','🎉'];
  for (let i=0;i<14;i++){
    const s = document.createElement('div');
    s.className = 'sparkle';
    s.textContent = icons[Math.floor(Math.random()*icons.length)];
    s.style.left = Math.random()*100 + 'vw';
    s.style.top = Math.random()*100 + 'vh';
    s.style.animationDelay = (Math.random()*5) + 's';
    s.style.animationDuration = (5 + Math.random()*4) + 's';
    bg.appendChild(s);
  }
}

const styleSheet = document.createElement('style');
styleSheet.textContent = `
@keyframes confettiFall{
  0%{transform:translateY(0) rotate(0deg);opacity:1;}
  100%{transform:translateY(110vh) rotate(720deg);opacity:0;}
}`;
document.head.appendChild(styleSheet);

initSparkles();
loadPool();
</script>
